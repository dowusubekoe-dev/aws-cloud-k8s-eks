# deploy-alpha.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: team-alpha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
      team: alpha
  template:
    metadata:
      labels:
        app: web
        team: alpha
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: team-alpha
spec:
  selector:
    app: web
    team: alpha
  ports:
  - port: 80
    targetPort: 80